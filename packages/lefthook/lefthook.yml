# Shared lefthook preset for btravstack repos. Consume by extending it from a
# repo's own lefthook.yml:
#
#   extends:
#     - node_modules/@btravstack/lefthook/lefthook.yml
#   pre-commit:
#     commands:
#       format:
#         exclude: ["pnpm-lock.yaml", "docs/api/*"]   # repo-specific
#
# It assumes the consumer has oxfmt, oxlint, and commitlint available (via the
# @btravstack/oxfmt, @btravstack/oxlint, @btravstack/commitlint peers).
#
# NOTE: this base deliberately sets NO `exclude` on the format/lint commands.
# lefthook's `extends` merge lets the EXTENDED (this) file OVERRIDE the local one
# for keys it defines — so if this base set `format.exclude`, a consumer could
# not layer its own excludes on top (the base's list would win). By omitting the
# key here, each repo declares its full `exclude` locally (which merges in) —
# excludes are repo-specific anyway (generated docs dirs, lockfile, type-only
# tests). Every consumer should at minimum exclude `pnpm-lock.yaml` from format.
pre-commit:
  parallel: true
  commands:
    format:
      # `*.x` (not `**/*.x`): lefthook's `*` spans `/`, so this matches files at
      # ANY depth including the repo root. `**/*.x` requires a leading directory,
      # so root files (`README.md`, root `*.json`) would silently never match.
      glob: "*.{ts,tsx,js,jsx,json,yaml,yml,md}"
      run: pnpm oxfmt {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm oxlint {staged_files}

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
