# Shared lefthook preset for btravstack repos. Consume by extending it from a
# repo's own lefthook.yml:
#
#   extends:
#     - node_modules/@btravstack/lefthook/lefthook.yml
#
# It assumes the consumer has oxfmt, oxlint, and commitlint available (via the
# @btravstack/oxfmt, @btravstack/oxlint, @btravstack/commitlint peers).
pre-commit:
  parallel: true
  commands:
    format:
      # `*.x` (not `**/*.x`): lefthook's `*` spans `/`, so this matches files at
      # ANY depth including the repo root. `**/*.x` requires a leading directory,
      # so root files (`README.md`, root `*.json`) would silently never match.
      glob: "*.{ts,tsx,js,jsx,json,yaml,yml,md}"
      # Handing oxfmt ONLY ignored files makes it exit non-zero, which would fail
      # a commit touching only those. Exclude the lockfile here so the step is
      # skipped instead. Extend this list in the consumer repo as needed.
      exclude:
        - "pnpm-lock.yaml"
      run: pnpm oxfmt {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm oxlint {staged_files}

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
