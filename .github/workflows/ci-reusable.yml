# Reusable CI workflow for btravstack repos. Consumers call it from a thin
# `.github/workflows/ci.yml`:
#
#   name: CI
#   on:
#     push: { branches: [main] }
#     pull_request: { branches: [main] }
#   jobs:
#     ci:
#       uses: btravstack/config/.github/workflows/ci-reusable.yml@main
#       with:
#         changeset: true          # contract repos that enforce changesets
#         bundle-size: true        # report per-package dist sizes
#         integration-tests: true  # run `test:integration`
#         node-floor: "22.19.0"    # also run tests on the engines floor
#
# The gate (format → lint → typecheck → build → knip → test → audit) runs in one
# job after a single install. `build` runs BEFORE `knip` so codegen (e.g. a Prisma
# client wired as a turbo build dependency) exists when knip resolves imports — no
# repo-specific pre-step needed. Optional jobs (node-floor matrix, bundle-size,
# integration) are toggled by inputs so callers stay thin.
name: CI (reusable)

on:
  workflow_call:
    inputs:
      knip:
        description: "Run knip (after build, with github-actions annotations)."
        type: boolean
        default: true
      changeset:
        description: "On PRs, fail if a versioned package changed without a changeset."
        type: boolean
        default: false
      security-audit:
        description: "Run `pnpm audit --audit-level=high`."
        type: boolean
        default: true
      bundle-size:
        description: "Report per-package `dist` sizes to the run summary."
        type: boolean
        default: false
      integration-tests:
        description: "Run the integration test command in a separate job."
        type: boolean
        default: false
      test-command:
        description: "Command used to run unit tests."
        type: string
        default: "pnpm test"
      integration-command:
        description: "Command used to run integration tests."
        type: string
        default: "pnpm test:integration"
      node-floor:
        description: "Extra Node version to also run build+test on (the engines floor). Empty skips."
        type: string
        default: ""
      node-version-file:
        description: "File the primary Node version is read from."
        type: string
        default: ".node-version"

permissions:
  contents: read

env:
  # Keep bundled JS actions on Node 24 (matches the repos' prior workflow-level env).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # so the changeset check can diff against origin/main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm format --check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      # Before knip: turbo build generates any codegen (e.g. Prisma client) that
      # knip needs to resolve imports, so knip needs no repo-specific pre-step.
      - name: Build
        run: pnpm build

      - name: Knip
        if: ${{ inputs.knip }}
        run: pnpm exec knip --reporter github-actions

      - name: Test
        run: ${{ inputs.test-command }}

      - name: Security audit
        if: ${{ inputs.security-audit }}
        run: pnpm audit --audit-level=high

      # Only on PRs, and never on the changesets "Version Packages" PR.
      - name: Changeset status
        if: >-
          ${{ inputs.changeset
              && github.event_name == 'pull_request'
              && !(github.head_ref == 'changeset-release/main'
                   && github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          git fetch --no-tags origin main
          pnpm exec changeset status --since=origin/main

  test-floor:
    name: Tests (Node ${{ inputs.node-floor }})
    if: ${{ inputs.node-floor != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["${{ inputs.node-floor }}"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-floor-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: ${{ inputs.test-command }}

  bundle-size:
    name: Bundle Size
    if: ${{ inputs.bundle-size }}
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Report bundle sizes
        run: |
          echo "## Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          for pkg in packages/*/dist; do
            if [ -d "$pkg" ]; then
              size=$(du -sh "$pkg" 2>/dev/null | cut -f1)
              name=$(basename "$(dirname "$pkg")")
              echo "| $name | $size |" >> $GITHUB_STEP_SUMMARY
            fi
          done

  integration:
    name: Integration Tests
    if: ${{ inputs.integration-tests }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: ${{ inputs.integration-command }}
