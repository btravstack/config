# Reusable CI workflow for btravstack repos. Consumers call it from a thin
# `.github/workflows/ci.yml`:
#
#   name: CI
#   on:
#     push: { branches: [main] }
#     pull_request: { branches: [main] }
#   jobs:
#     ci:
#       uses: btravstack/config/.github/workflows/ci-reusable.yml@workflows-v1
#       with:
#         changeset: true          # contract repos that enforce changesets
#         integration-tests: true  # run the integration suite
#         node-floor: "22.19"      # also test on the engines floor
#
# Each check is its OWN job so the PR check summary lists them individually
# (Format, Lint, Type Check, …) rather than one opaque job. The unit/integration
# test commands and bundle-size reporting are standardized here (identical across
# repos) — callers only toggle what genuinely differs (integration, changeset,
# node-floor). knip runs standalone (repos scope `!generated` in knip.json, so no
# codegen pre-step is needed). Every job restores the `.turbo` cache.
name: CI (reusable)

on:
  workflow_call:
    inputs:
      knip:
        description: "Run the Knip job."
        type: boolean
        default: true
      changeset:
        description: "Run the changeset-status job on PRs."
        type: boolean
        default: false
      security-audit:
        description: "Run the security-audit job."
        type: boolean
        default: true
      bundle-size:
        description: "Run the bundle-size report job."
        type: boolean
        default: true
      integration-tests:
        description: "Run the integration-tests job."
        type: boolean
        default: false
      test-command:
        description: "Unit test command (standardized; override only if a repo truly differs)."
        type: string
        default: "pnpm test -- --coverage --reporter=default --reporter=github-actions"
      integration-command:
        description: "Integration test command (capped concurrency for testcontainers)."
        type: string
        default: "pnpm test:integration --concurrency 3 -- --coverage --reporter=default --reporter=github-actions"
      node-floor:
        description: "Extra Node version to build+test on (the engines floor). Empty skips."
        type: string
        default: ""
      node-version-file:
        description: "File the primary Node version is read from."
        type: string
        default: ".node-version"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm format --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  knip:
    name: Knip
    if: ${{ inputs.knip }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec knip --reporter github-actions

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: ${{ inputs.test-command }}

  test-floor:
    name: Tests (Node ${{ inputs.node-floor }})
    if: ${{ inputs.node-floor != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-floor }}
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-floor-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: ${{ inputs.test-command }}

  security-audit:
    name: Security Audit
    if: ${{ inputs.security-audit }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  changeset:
    name: Changeset
    if: >-
      ${{ inputs.changeset
          && github.event_name == 'pull_request'
          && !(github.head_ref == 'changeset-release/main'
               && github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: |
          git fetch --no-tags origin main
          pnpm exec changeset status --since=origin/main

  bundle-size:
    name: Bundle Size
    if: ${{ inputs.bundle-size }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Report bundle sizes
        run: |
          echo "## Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          for pkg in packages/*/dist; do
            if [ -d "$pkg" ]; then
              size=$(du -sh "$pkg" 2>/dev/null | cut -f1)
              name=$(basename "$(dirname "$pkg")")
              echo "| $name | $size |" >> $GITHUB_STEP_SUMMARY
            fi
          done

  integration:
    name: Integration Tests
    if: ${{ inputs.integration-tests }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: ${{ inputs.integration-command }}
